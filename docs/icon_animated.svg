<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#FFFFFF" flood-opacity="0.4"/>
    </filter>

    <style>
      @keyframes wiggle {
        0%, 100% { transform: translate(52px, 52px) scale(17) translate(12px, 12px) rotate(-10deg) translate(-12px, -12px); }
        50%      { transform: translate(52px, 52px) scale(17) translate(12px, 12px) rotate(10deg)  translate(-12px, -12px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.35; transform: translate(52px, 52px) scale(17) translate(12px, 12px) scale(0.95) translate(-12px, -12px); }
        50%      { opacity: 0.75; transform: translate(52px, 52px) scale(17) translate(12px, 12px) scale(1.05) translate(-12px, -12px); }
      }
      .anim-wiggle { animation: wiggle 3s ease-in-out infinite; transform-origin: 0 0; }
      .anim-pulse  { animation: pulse 3s ease-in-out infinite; transform-origin: 0 0; }
    </style>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g class="anim-pulse" filter="url(#glow)" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
  </g>

  <g class="anim-wiggle" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
  </g>
</svg>
